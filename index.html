<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Headquarter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="HQ">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  window.__HQ_TWEAKS = {
    "name": "Alex",
    "accent": "#f5f0e8",
    "density": "compact",
    "numberWeight": 400,
    "showQuickPills": true,
    "currencyPrefix": "Rp ",
    "homeLayout": "stacked"
  };
</script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap");

  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card-2: #161616;
    --border: #2a2a2a;
    --border-strong: #353535;
    --text: #f4f4f4;
    --text-dim: #9a9a9a;
    --text-faint: #6a6a6a;
    --accent: #f5f0e8;
    --danger: #d97a6c;
    --good: #8aa888;
    --r-card: 16px;
    --r-sm: 10px;
    --r-pill: 50px;
    --pad-card: 24px;
    --gap: 16px;
    --t-fast: 150ms;
    --t-mid: 200ms;
    --t-slow: 400ms;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); }
  body {
    font-size: 13px;
    font-weight: 400;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, textarea, select { font: inherit; color: inherit; background: transparent; border: 0; outline: 0; }
  ::selection { background: var(--accent); color: #111; }

  /* ============ LOGIN SCREEN ============ */
  #login-screen {
    position: fixed; inset: 0;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; overflow: hidden;
  }
  #login-screen.hidden { display: none; }

  .ring {
    position: relative;
    width: 500px; height: 500px;
    display: flex; justify-content: center; align-items: center;
  }
  @media (max-width: 560px) {
    .ring { width: 340px; height: 340px; }
  }
  .ring i {
    position: absolute; inset: 0;
    border: 2px solid #fff;
    transition: 0.5s;
  }
  .ring i:nth-child(1) {
    border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
    animation: ring-spin 6s linear infinite;
  }
  .ring i:nth-child(2) {
    border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
    animation: ring-spin 4s linear infinite;
  }
  .ring i:nth-child(3) {
    border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
    animation: ring-spin-rev 10s linear infinite;
  }
  .ring:hover i {
    border: 6px solid var(--clr);
    filter: drop-shadow(0 0 20px var(--clr));
  }
  @keyframes ring-spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes ring-spin-rev {
    0%   { transform: rotate(360deg); }
    100% { transform: rotate(0deg); }
  }

  .ring-login {
    position: absolute;
    width: 300px; height: 100%;
    display: flex; justify-content: center; align-items: center;
    flex-direction: column; gap: 14px;
  }
  @media (max-width: 560px) {
    .ring-login { width: 210px; gap: 10px; }
  }
  .ring-login h2 {
    font-size: 2em; color: #fff;
    font-family: 'Quicksand', var(--font);
    font-weight: 600; letter-spacing: 0.24em;
    margin-bottom: 2px;
  }
  .ring-input-box { position: relative; width: 100%; }
  .ring-input-box input {
    width: 100%; padding: 11px 20px;
    background: transparent;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 40px;
    font-size: 0.92em; color: #fff; outline: none;
    font-family: 'Quicksand', var(--font);
    transition: border-color 0.3s;
  }
  .ring-input-box input:focus { border-color: rgba(255,255,255,0.8); }
  .ring-input-box input::placeholder { color: rgba(255,255,255,0.45); }

  .ring-submit {
    width: 100%; padding: 11px 20px;
    background: linear-gradient(135deg, #2d3461 0%, #6a5acd 100%);
    border: none; border-radius: 40px;
    font-size: 0.92em; color: #fff;
    font-family: 'Quicksand', var(--font); font-weight: 600;
    cursor: pointer; letter-spacing: 0.08em;
    transition: opacity 0.2s;
  }
  .ring-submit:hover { opacity: 0.82; }

  .ring-google-btn {
    width: 100%; padding: 11px 20px;
    background: transparent;
    border: 2px solid rgba(255,255,255,0.4); border-radius: 40px;
    font-size: 0.92em; color: #fff;
    font-family: 'Quicksand', var(--font);
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    transition: border-color 0.3s, background 0.3s;
  }
  .ring-google-btn:hover {
    border-color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.04);
  }
  .ring-google-btn svg { flex-shrink: 0; }

  .ring-forgot {
    color: rgba(255,255,255,0.45); font-size: 11px;
    font-family: 'Quicksand', var(--font);
    background: none; border: none; cursor: pointer;
    letter-spacing: 0.06em; transition: color 0.2s;
  }
  .ring-forgot:hover { color: rgba(255,255,255,0.8); }

  .login-msg {
    font-size: 12px; text-align: center;
    display: none; line-height: 1.5;
    font-family: 'Quicksand', var(--font);
  }
  .login-msg.error  { color: #ff8a80; display: block; }
  .login-msg.success { color: #8aa888; display: block; }

  /* ============ APP SHELL ============ */
  .app {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 100vh;
  }
  .sidebar {
    display: none;
    position: sticky;
    top: 0;
    height: 100vh;
    border-right: 1px solid var(--border);
    padding: 28px 18px;
    flex-direction: column;
    gap: 4px;
  }
  .sidebar .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px 22px;
    letter-spacing: 0.18em;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 500;
  }
  .sidebar .brand .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .nav-group-label {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-faint); padding: 14px 10px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 10px 10px;
    border-radius: var(--r-sm); font-size: 13px;
    color: var(--text-dim);
    transition: background var(--t-fast) ease, color var(--t-fast) ease;
    text-align: left;
  }
  .nav-item .glyph { width: 18px; text-align: center; font-size: 13px; color: var(--text-faint); }
  .nav-item:hover { background: #181818; color: var(--text); }
  .nav-item.active { background: #1f1f1f; color: var(--text); }
  .nav-item.active .glyph { color: var(--accent); }
  .sidebar-logout {
    margin-top: auto;
    padding: 8px 10px;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint);
    transition: color var(--t-fast) ease;
    text-align: left;
    cursor: pointer;
    border: none; background: none; font-family: inherit;
  }
  .sidebar-logout:hover { color: var(--danger); }

  main {
    min-width: 0; padding: 16px 16px 96px;
    max-width: 980px; width: 100%; margin: 0 auto;
  }

  /* Header */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 4px 18px;
  }
  .topbar .greet { display: flex; flex-direction: column; }
  .topbar .greet .hello { font-size: 13px; color: var(--text-dim); }
  .topbar .greet .date { font-size: 11px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .topbar .right { display: flex; gap: 10px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    transition: border-color var(--t-fast) ease, color var(--t-fast) ease;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .logout-btn {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint);
    transition: color var(--t-fast) ease;
    padding: 6px 10px;
    border-radius: var(--r-pill);
    border: 1px solid transparent;
  }
  .logout-btn:hover { color: var(--danger); border-color: color-mix(in oklab, var(--danger) 40%, var(--border)); }

  /* ============ TABS / PAGES ============ */
  .page-title {
    font-size: 24px; font-weight: 300; letter-spacing: -0.01em; margin: 6px 4px 18px;
  }
  .section-title {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    font-weight: 500; color: var(--text-dim); margin: 22px 4px 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-title .meta { color: var(--text-faint); letter-spacing: 0.06em; text-transform: none; font-weight: 400; }

  /* ============ CARDS ============ */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r-card); padding: var(--pad-card);
    opacity: 0; transform: translateY(12px);
    animation: card-in var(--t-slow) ease-out forwards;
  }
  @keyframes card-in { to { opacity: 1; transform: translateY(0); } }
  .card + .card { margin-top: var(--gap); }
  .card-row { display: grid; gap: var(--gap); }

  .metric-grid {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--gap);
  }
  @media (max-width: 520px) { .metric-grid { grid-template-columns: 1fr; } }
  .metric .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 500; color: var(--text-dim); }
  .metric .num { font-size: 32px; font-weight: var(--num-weight, 300); letter-spacing: -0.02em; margin-top: 10px; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .metric .sub { margin-top: 6px; font-size: 12px; color: var(--text-faint); }

  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    border: 1px solid var(--border); border-radius: var(--r-pill);
    padding: 8px 14px; font-size: 12px; color: var(--text-dim);
    background: transparent;
    transition: border-color var(--t-fast) ease, color var(--t-fast) ease, background var(--t-fast) ease;
    white-space: nowrap;
  }
  .pill:hover { color: var(--text); border-color: var(--border-strong); }
  .pill.active { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 500; }
  .pill.warn { border-color: color-mix(in oklab, var(--danger) 60%, var(--border)); color: var(--danger); }
  .pill.cat { background: #202020; border-color: #2c2c2c; color: var(--text); }
  .pill.cat .amt { color: var(--text-dim); margin-left: 8px; font-variant-numeric: tabular-nums; }

  .alert {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border: 1px solid color-mix(in oklab, var(--danger) 50%, var(--border));
    border-radius: var(--r-pill); color: var(--danger); font-size: 12px;
    background: color-mix(in oklab, var(--danger) 10%, transparent);
    width: max-content; max-width: 100%;
  }
  .alert .glyph { font-size: 12px; }

  /* ============ LISTS ============ */
  .list { list-style: none; padding: 0; margin: 0; }
  .list-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .list-item:last-child { border-bottom: 0; }
  .time-col { flex: 0 0 64px; color: var(--text-faint); font-size: 12px; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
  .item-main { flex: 1; min-width: 0; }
  .item-title { font-size: 13px; color: var(--text); }
  .item-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .item-amt { font-variant-numeric: tabular-nums; font-size: 14px; color: var(--text); white-space: nowrap; }
  .item-tag { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); border: 1px solid var(--border); border-radius: var(--r-pill); padding: 3px 8px; }

  /* ============ CHECKBOXES ============ */
  .check {
    flex: 0 0 18px; width: 18px; height: 18px;
    border: 1px solid var(--border-strong); border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color var(--t-fast) ease, background var(--t-fast) ease;
    position: relative;
  }
  .check::after {
    content: ""; width: 8px; height: 4px;
    border-left: 1.5px solid #111; border-bottom: 1.5px solid #111;
    transform: rotate(-45deg) scale(0); transform-origin: center;
    transition: transform var(--t-fast) ease; margin-top: -2px;
  }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.checked::after { transform: rotate(-45deg) scale(1); }
  .check.pulse { animation: pulse 150ms ease; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
  .check-label { flex: 1; min-width: 0; }
  .check-label.done { color: var(--text-faint); text-decoration: line-through; text-decoration-color: var(--text-faint); }

  /* ============ PROGRESS ============ */
  .progress { height: 4px; background: #232323; border-radius: 4px; overflow: hidden; margin-top: 14px; }
  .progress > .bar { height: 100%; background: var(--accent); width: 0; transition: width 600ms ease; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-faint); margin-top: 8px; letter-spacing: 0.06em; }

  /* ============ ADD BUTTON / FORMS ============ */
  .add-btn {
    display: flex; align-items: center; gap: 10px; padding: 14px 16px;
    border: 1px dashed var(--border-strong); border-radius: var(--r-sm);
    color: var(--text-dim); width: 100%;
    transition: color var(--t-fast) ease, border-color var(--t-fast) ease;
    font-size: 12px;
  }
  .add-btn:hover { color: var(--text); border-color: #444; }
  .add-btn .plus { font-size: 14px; line-height: 1; }
  .inline-form { overflow: hidden; max-height: 0; transition: max-height 300ms ease; }
  .inline-form.open { max-height: 360px; }
  .inline-form .inner {
    padding: 16px; margin-top: 12px; border: 1px solid var(--border);
    border-radius: var(--r-sm); background: var(--card-2); display: grid; gap: 10px;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); font-weight: 500; }
  .field input, .field select, .field textarea {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    background: #121212; color: var(--text); font-size: 13px;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn { padding: 9px 14px; border-radius: var(--r-pill); font-size: 12px; border: 1px solid var(--border-strong); color: var(--text-dim); }
  .btn:hover { color: var(--text); }
  .btn.primary { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 500; }
  .btn.primary:hover { color: #111; }

  /* ============ SCHEDULE CALENDAR ============ */
  .cal-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 14px; }
  .cal-head .month-label { font-size: 16px; font-weight: 500; letter-spacing: -0.005em; color: var(--text); }
  .cal-head .month-sub { font-size: 11px; color: var(--text-faint); letter-spacing: 0.06em; margin-top: 2px; }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav button {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    color: var(--text-dim); display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; transition: border-color var(--t-fast) ease, color var(--t-fast) ease, background var(--t-fast) ease;
  }
  .cal-nav button:hover { color: var(--text); border-color: var(--border-strong); }
  .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 2px 6px; }
  .cal-dow .d { text-align: center; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); font-weight: 500; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell {
    aspect-ratio: 1 / 1; border-radius: 10px; border: 1px solid transparent;
    background: transparent; color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    position: relative; transition: background var(--t-fast) ease, color var(--t-fast) ease, border-color var(--t-fast) ease;
    font-variant-numeric: tabular-nums;
  }
  .cal-cell:hover { background: #181818; color: var(--text); }
  .cal-cell .n { font-size: 13px; font-weight: 400; line-height: 1; }
  .cal-cell .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-dim); margin-top: 2px; }
  .cal-cell.other { color: var(--text-faint); opacity: 0.4; }
  .cal-cell.other:hover { background: transparent; }
  .cal-cell.today { border-color: var(--border-strong); color: var(--text); }
  .cal-cell.selected { background: var(--accent); color: #111; border-color: var(--accent); }
  .cal-cell.selected .dot { background: #111; }
  .cal-cell.today.selected { color: #111; }
  @media (max-width: 420px) { .cal-cell { border-radius: 8px; } .cal-cell .n { font-size: 12px; } }
  @media (min-width: 900px) { .cal-cell .n { font-size: 14px; } }

  /* ============ HABITS ============ */
  .habit-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--gap); }
  @media (max-width: 380px) { .habit-grid { grid-template-columns: 1fr; } }
  @media (min-width: 720px) { .habit-grid { grid-template-columns: repeat(3, 1fr); } }
  .habit {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r-card);
    padding: 18px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color var(--t-mid) ease, box-shadow var(--t-mid) ease;
  }
  .habit.checked { border-color: color-mix(in oklab, var(--accent) 40%, var(--border)); }
  .habit-top { display: flex; align-items: center; justify-content: space-between; }
  .habit-name { font-size: 14px; }
  .habit-streak { font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }
  .habit-streak .num { color: var(--text); font-variant-numeric: tabular-nums; }
  .habit-row { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
  .habit .check { width: 22px; height: 22px; border-radius: 6px; }
  .habit .status { font-size: 11px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .habit.checked .status { color: var(--accent); }
  .habit-grid-7 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 4px; }
  .habit-grid-7 .cell { aspect-ratio: 1 / 1; border-radius: 4px; background: #232323; }
  .habit-grid-7 .cell.on { background: var(--accent); }

  /* ---- habit delete ---- */
  .habit { position: relative; }
  .habit-del {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: color-mix(in oklab, var(--danger) 12%, transparent);
    color: var(--danger); font-size: 15px; line-height: 1;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease, background 150ms ease;
    cursor: pointer;
  }
  .habit:hover .habit-del,
  .habit.delete-mode .habit-del { opacity: 1; pointer-events: auto; }
  .habit.delete-mode { opacity: 0.6; }
  @keyframes habit-shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-5px); }
    40%     { transform: translateX(5px); }
    60%     { transform: translateX(-3px); }
    80%     { transform: translateX(3px); }
  }
  .habit.shaking { animation: habit-shake 300ms ease; }
  .habit.deleting {
    opacity: 0; transform: scale(0.95);
    transition: opacity 250ms ease, transform 250ms ease;
    pointer-events: none;
  }

  /* ---- habit edit ---- */
  .habit-edit {
    position: absolute; top: 10px; right: 36px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: var(--text-dim); font-size: 13px; line-height: 1;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease;
    cursor: pointer;
  }
  .habit:hover .habit-edit,
  .habit.delete-mode .habit-edit { opacity: 1; pointer-events: auto; }
  .habit-edit:hover { color: var(--text); }

/* =========================================================
   LOAD DATA FROM SUPABASE → state
========================================================= */
async function loadFromSupabase(userId) {
  const [
    profileRes, eventsRes, goalsRes, habitsRes,
    habitLogsRes, focusBoardRes, focusTasksRes,
    incomeRes, spendingRes, debtsRes
  ] = await Promise.all([
    sb.from('profiles').select('*').eq('id', userId).maybeSingle(),
    sb.from('schedule_events').select('*').eq('user_id', userId),
    sb.from('goals').select('*').eq('user_id', userId).order('created_at'),
    sb.from('habits').select('*').eq('user_id', userId).order('created_at'),
    sb.from('habit_logs').select('*').eq('user_id', userId),
    sb.from('focus_board').select('*').eq('user_id', userId).maybeSingle(),
    sb.from('focus_tasks').select('*').eq('user_id', userId).order('created_at'),
    sb.from('income_entries').select('*').eq('user_id', userId).order('date', { ascending: false }),
    sb.from('spending_entries').select('*').eq('user_id', userId).order('date', { ascending: false }),
    sb.from('debts').select('*').eq('user_id', userId).order('due_date')
  ]);

  const isNewUser = !profileRes.data;

  if (isNewUser) {
    await seedSampleData(userId);
    return;
  }

  // Profile — auth metadata takes priority over DB value
  state.profile.name = displayNameFromUser(currentUser) || profileRes.data?.name || 'Friend';
  window.__HQ_TWEAKS.name = state.profile.name;

  // Schedule: group events by date
  state.schedule = {};
  (eventsRes.data || []).forEach(e => {
    const d = e.date;
    if (!state.schedule[d]) state.schedule[d] = [];
    state.schedule[d].push({ id: e.id, time: e.time, title: e.title, sub: e.note || '', alarm_time: e.alarm_time || null });
  });

  // Goals
  state.goals.dos   = (goalsRes.data || []).filter(g => g.type === 'do').map(g => ({ id: g.id, text: g.text, done: g.checked }));
  state.goals.donts = (goalsRes.data || []).filter(g => g.type === 'dont').map(g => ({ id: g.id, text: g.text, done: g.checked }));

  // Habits + logs
  const allLogs = habitLogsRes.data || [];
  const today = todayISO();
  state.habits = (habitsRes.data || []).map(h => {
    const hLogs = allLogs.filter(l => l.habit_id === h.id);
    const doneToday = hLogs.some(l => l.date === today && l.checked);
    const log = compute7DayLog(hLogs);
    return { id: h.id, name: h.name, streak: h.streak || 0, doneToday, log };
  });

  // Focus board
  if (focusBoardRes.data) {
    focusBoardId = focusBoardRes.data.id;
    state.focus.main = focusBoardRes.data.main_focus || '';
    state.focus.tasks = (focusTasksRes.data || []).map(t => ({ id: t.id, text: t.text, done: t.checked, description: t.description || '' }));
  } else {
    // Create empty focus board for user
    const { data: fb } = await sb.from('focus_board').insert({ user_id: userId, main_focus: '' }).select().single();
    if (fb) focusBoardId = fb.id;
    state.focus = { main: '', tasks: [] };
  }

  // Finance
  state.income   = (incomeRes.data   || []).map(i => ({ id: i.id, date: i.date, source: i.source, amount: Number(i.amount) }));
  state.spending = (spendingRes.data  || []).map(s => ({ id: s.id, date: s.date, time: s.time, cat: s.category, note: s.note, amount: Number(s.amount) }));
  state.debts    = (debtsRes.data     || []).map(d => ({ id: d.id, creditor: d.creditor, amount: Number(d.amount), due: d.due_date, paid: d.paid }));
}

function compute7DayLog(logs) {
  const result = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const iso = isoLocal(d);
    result.push(logs.some(l => l.date === iso && l.checked) ? 1 : 0);
  }
  return result;
}

function computeStreak(logs) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 60; i++) {
    const iso = isoLocal(d);
    if (logs.some(l => l.date === iso && l.checked)) streak++;
    else break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

/* =========================================================
   SEED SAMPLE DATA (first login)
========================================================= */
async function seedSampleData(userId) {
  const def = defaultState();

  // Profile
  const realName = displayNameFromUser(currentUser);
  await sb.from('profiles').upsert({ id: userId, name: realName });
  state.profile.name = realName;
  window.__HQ_TWEAKS.name = realName;

  // Schedule events
  const schedRows = [];
  Object.entries(def.schedule).forEach(([date, events]) => {
    events.forEach(e => schedRows.push({ user_id: userId, date, time: e.time, title: e.title, note: e.sub || '' }));
  });
  const { data: schedData } = await sb.from('schedule_events').insert(schedRows).select();
  state.schedule = {};
  (schedData || []).forEach(e => {
    if (!state.schedule[e.date]) state.schedule[e.date] = [];
    state.schedule[e.date].push({ id: e.id, time: e.time, title: e.title, sub: e.note || '', alarm_time: null });
  });

  // Goals
  const goalRows = [
    ...def.goals.dos.map(g => ({ user_id: userId, type: 'do', text: g.text, checked: g.done })),
    ...def.goals.donts.map(g => ({ user_id: userId, type: 'dont', text: g.text, checked: g.done }))
  ];
  const { data: goalData } = await sb.from('goals').insert(goalRows).select();
  state.goals.dos   = (goalData || []).filter(g => g.type === 'do').map(g => ({ id: g.id, text: g.text, done: g.checked }));
  state.goals.donts = (goalData || []).filter(g => g.type === 'dont').map(g => ({ id: g.id, text: g.text, done: g.checked }));

  // Habits + logs
  const habitRows = def.habits.map(h => ({ user_id: userId, name: h.name, streak: h.streak }));
  const { data: habitData } = await sb.from('habits').insert(habitRows).select();
  const today = todayISO();
  const logRows = [];
  (habitData || []).forEach((h, i) => {
    const defH = def.habits[i];
    for (let j = 6; j >= 0; j--) {
      const d = new Date(); d.setDate(d.getDate() - j);
      const iso = isoLocal(d);
      logRows.push({ habit_id: h.id, user_id: userId, date: iso, checked: defH.log[6 - j] === 1 });
    }
  });
  await sb.from('habit_logs').insert(logRows);
  state.habits = (habitData || []).map((h, i) => ({ ...def.habits[i], id: h.id }));

  // Focus board
  const { data: fb } = await sb.from('focus_board').insert({ user_id: userId, main_focus: def.focus.main }).select().single();
  if (fb) {
    focusBoardId = fb.id;
    const taskRows = def.focus.tasks.map(t => ({ focus_id: fb.id, user_id: userId, text: t.text, checked: t.done }));
    const { data: taskData } = await sb.from('focus_tasks').insert(taskRows).select();
    state.focus = { main: def.focus.main, tasks: (taskData || []).map(t => ({ id: t.id, text: t.text, done: t.checked })) };
  }

  // Income
  const incomeRows = def.income.map(i => ({ user_id: userId, date: i.date, source: i.source, amount: i.amount }));
  const { data: incomeData } = await sb.from('income_entries').insert(incomeRows).select();
  state.income = (incomeData || []).map(i => ({ id: i.id, date: i.date, source: i.source, amount: Number(i.amount) }));

  // Spending
  const spendRows = def.spending.map(s => ({ user_id: userId, date: s.date, time: s.time, category: s.cat, note: s.note, amount: s.amount }));
  const { data: spendData } = await sb.from('spending_entries').insert(spendRows).select();
  state.spending = (spendData || []).map(s => ({ id: s.id, date: s.date, time: s.time, cat: s.category, note: s.note, amount: Number(s.amount) }));

  // Debts
  const debtRows = def.debts.map(d => ({ user_id: userId, creditor: d.creditor, amount: d.amount, due_date: d.due, paid: d.paid }));
  const { data: debtData } = await sb.from('debts').insert(debtRows).select();
  state.debts = (debtData || []).map(d => ({ id: d.id, creditor: d.creditor, amount: Number(d.amount), due: d.due_date, paid: d.paid }));
}

function displayNameFromUser(user) {
  const meta = user?.user_metadata || {};
  const raw = meta.full_name || meta.name || (user?.email || '').split('@')[0] || 'Friend';
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-loading').classList.add('hidden');
  document.getElementById('app').style.display = '';
  document.getElementById('bottom-nav').style.display = '';
}

async function handleSession(session) {
  if (!session) { showLogin(); return; }
  if (currentUser && currentUser.id === session.user.id) return;
  currentUser = session.user;
  state.profile.name = displayNameFromUser(currentUser);
  window.__HQ_TWEAKS.name = state.profile.name;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-loading').classList.remove('hidden');

  try {
    await loadFromSupabase(currentUser.id);
  } catch (e) {
    console.error('Failed to load data', e);
    showToast('Failed to load data. Please refresh.');
  }

  applyTweaks();
  restoreUIPrefs();
  showApp();
  syncTweaksUI();
  render();
  initGlobalBindings();

  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  checkAlarms();
  if (!alarmInterval) {
    alarmInterval = setInterval(checkAlarms, 60000);
  }
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  showLogin();
}

let hiddenAt = null;

document.addEventListener('visibilitychange', () => {

/* ---- LIFE: SCHEDULE ---- */
function buildMonthGrid(viewYear, viewMonth) {
  const first = new Date(viewYear, viewMonth, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const cells = [];
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  for (let i = startWeekday - 1; i >= 0; i--) cells.push({ d: new Date(viewYear, viewMonth - 1, prevDays - i), other: true });
  for (let i = 1; i <= daysInMonth; i++) cells.push({ d: new Date(viewYear, viewMonth, i), other: false });
  let next = 1;
  while (cells.length < 42) cells.push({ d: new Date(viewYear, viewMonth + 1, next++), other: true });
  return cells;
}

/* ---- FINANCE: OVERVIEW ---- */
function thisMonthIncome() {
  const ym = ymLocal(new Date());
  return state.income.filter(i => (i.date||'').startsWith(ym)).reduce((s,i) => s + Number(i.amount||0), 0);
}
function todaySpend() {
  return state.spending.filter(s => s.date === todayISO()).reduce((s,i) => s + Number(i.amount||0), 0);
}
function totalDebt() {
  return state.debts.filter(d => !d.paid).reduce((s,d) => s + Number(d.amount||0), 0);
}
function daysUntil(iso) {
  const d = new Date(iso); d.setHours(0,0,0,0);
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function last7DaysSpend() {
  const out = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const iso = isoLocal(d);
    const total = state.spending.filter(s => s.date === iso).reduce((s,x) => s + Number(x.amount||0), 0);
    out.push({ iso, total, label: d.toLocaleDateString(undefined,{weekday:'short'}).slice(0,1) });
  }
  return out;
}

function renderFinanceOverview() {
  const inc = thisMonthIncome(), spent = todaySpend(), debt = totalDebt();
  const soonest = state.debts.filter(d=>!d.paid).map(d=>daysUntil(d.due)).sort((a,b)=>a-b)[0];
  const showAlert = soonest !== undefined && soonest <= 7 && soonest >= 0;
  const days = last7DaysSpend();
  const max = Math.max(1, ...days.map(d=>d.total));
  const pfx = window.__HQ_TWEAKS.currencyPrefix||'$';

  return `
    ${topbar()}
    <h1 class="page-title">Finance</h1>
    <div class="metric-grid">
      <div class="card metric" style="animation-delay:0ms"><div class="label">Income · this month</div><div class="num" data-target="${inc}" data-prefix="${pfx}">${fmtMoney(0)}</div><div class="sub">${state.income.length} entries</div></div>
      <div class="card metric" style="animation-delay:80ms"><div class="label">Spent · today</div><div class="num" data-target="${spent}" data-prefix="${pfx}">${fmtMoney(0)}</div><div class="sub">${state.spending.filter(s=>s.date===todayISO()).length} transactions</div></div>
      <div class="card metric" style="animation-delay:160ms"><div class="label">Total debt</div><div class="num" data-target="${debt}" data-prefix="${pfx}">${fmtMoney(0)}</div><div class="sub">${state.debts.filter(d=>!d.paid).length} open</div></div>
    </div>
    ${showAlert ? `<div class="alert" style="margin-top:18px"><span class="glyph">⚠</span> Debt due in ${soonest} day${soonest===1?'':'s'}</div>` : ''}
    <div class="card" style="margin-top:18px; animation-delay:220ms">
      <div class="section-title" style="margin-top:0">Last 7 days spending <span class="meta">${fmtMoney(days.reduce((a,b)=>a+b.total,0))}</span></div>
      <div class="bar-chart">
        ${days.map((d,i) => `
          <div class="col ${d.total===0?'dim':''}">

/* =========================================================
   ROUTER
========================================================= */
const ROUTES = {
  'life:home': renderLifeHome,
  'life:schedule': renderSchedule,
  'life:goals': renderGoals,
  'life:habits': renderHabits,
  'life:focus': renderFocus,
  'finance:overview': renderFinanceOverview,
  'finance:income': renderIncome,
  'finance:spending': renderSpending,
  'finance:debts': renderDebts
};

function render() {
  const tab = state.activeTab in ROUTES ? state.activeTab : 'life:home';
  const html = ROUTES[tab]();
  main.style.transition = 'opacity 200ms ease';
  main.style.opacity = '0';
  requestAnimationFrame(() => {
    setTimeout(() => {
      main.innerHTML = html;
      bindMainEvents();
      animateNumbers();
      animateBars();
      main.style.opacity = '1';
    }, 60);
  });
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.go === tab));
  document.querySelectorAll('.bottom-nav .tab-btn').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
}

/* =========================================================
   ANIMATIONS
========================================================= */
function animateNumbers() {
  document.querySelectorAll('.num[data-target]').forEach(el => {
    const target = Number(el.dataset.target || 0);
    const prefix = el.dataset.prefix || '';
    const start = performance.now();
    const dur = 600;
    const fmt = (n) => prefix + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    function step(now) {
      const t = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - t, 3);
      el.textContent = fmt(target * eased);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}
function animateBars() {
  document.querySelectorAll('.bar-chart .bar').forEach(b => {
    const h = b.style.height;
    b.style.height = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => { b.style.height = h; }));
  });
}

/* =========================================================
   EVENT BINDING
========================================================= */
function bindMainEvents() {
  // tweaks + logout (inside main, re-bound on each render)
  const ot = main.querySelector('#open-tweaks');
  if (ot) ot.addEventListener('click', toggleTweaks);
  const tlb = main.querySelector('#topbar-logout-btn');
  if (tlb) tlb.addEventListener('click', signOut);

  // navigation pills
  main.querySelectorAll('[data-go]').forEach(el => el.addEventListener('click', () => setActiveTab(el.dataset.go)));

  // schedule day pick
  main.querySelectorAll('[data-pick-day]').forEach(el => el.addEventListener('click', () => {
    state.selectedDay = el.dataset.pickDay;
    state.viewMonth = el.dataset.pickDay.slice(0,7);
    saveUIPrefs(); render();
  }));

  // calendar month nav
  main.querySelectorAll('[data-cal-nav]').forEach(el => el.addEventListener('click', () => {
    const dir = Number(el.dataset.calNav);
    const [y, m] = (state.viewMonth || todayISO().slice(0,7)).split('-').map(Number);
    state.viewMonth = ymLocal(new Date(y, m - 1 + dir, 1));
    saveUIPrefs(); render();
  }));
  const calToday = main.querySelector('[data-cal-today]');
  if (calToday) calToday.addEventListener('click', () => {
    const t = todayISO();
    state.selectedDay = t;
    state.viewMonth = t.slice(0,7);
    saveUIPrefs(); render();
  });

  // focus task toggle
  main.querySelectorAll('[data-toggle-focus]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.toggleFocus;
    const t = state.focus.tasks.find(x => x.id === id);
    if (!t) return;
    t.done = !t.done;
    pulse(el); render();
    dbCall(() => sb.from('focus_tasks').update({ checked: t.done }).eq('id', id));
  }));

  // habit toggle
  main.querySelectorAll('[data-toggle-habit]').forEach(el => el.addEventListener('click', async () => {
    const id = el.dataset.toggleHabit;
    const h = state.habits.find(x => x.id === id);
    if (!h) return;
    h.doneToday = !h.doneToday;
    if (h.doneToday) { h.streak += 1; h.log = h.log.slice(1).concat(1); }
    else { h.streak = Math.max(0, h.streak - 1); h.log = h.log.slice(0,-1); h.log.push(0); h.log = h.log.slice(-7); }
    pulse(el); render();
    const today = todayISO();
    await dbCall(() => sb.from('habit_logs').upsert(
      { habit_id: id, user_id: currentUser.id, date: today, checked: h.doneToday },
      { onConflict: 'habit_id,date' }
    ));
    dbCall(() => sb.from('habits').update({ streak: h.streak }).eq('id', id));
  }));

  // habit delete — × button click
  main.querySelectorAll('[data-del-habit]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = el.dataset.delHabit;
    const card = el.closest('.habit');
    if (!card) return;
    card.classList.remove('delete-mode');
    card.classList.add('deleting');
    setTimeout(() => {
      state.habits = state.habits.filter(h => h.id !== id);
      render();
      dbCall(() => sb.from('habits').delete().eq('id', id));
      dbCall(() => sb.from('habit_logs').delete().eq('habit_id', id));
    }, 260);
  }));

  // habit long-press — mobile delete mode
  main.querySelectorAll('.habit').forEach(card => {
    let pressTimer = null;
    const startPress = (e) => {
      if (e.target.closest('[data-toggle-habit], .habit-del, .habit-edit')) return;
      pressTimer = setTimeout(() => {
        pressTimer = null;
        card.classList.add('shaking', 'delete-mode');
        card.addEventListener('animationend', () => card.classList.remove('shaking'), { once: true });
      }, 500);
    };
    const cancelPress = () => { clearTimeout(pressTimer); pressTimer = null; };
    card.addEventListener('touchstart',  startPress,   { passive: true });
    card.addEventListener('touchend',    cancelPress,  { passive: true });
    card.addEventListener('touchmove',   cancelPress,  { passive: true });
    card.addEventListener('touchcancel', cancelPress,  { passive: true });
  });

  // habit edit — ✎ button
  main.querySelectorAll('[data-edit-habit]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = el.dataset.editHabit;
    const card = el.closest('.habit');
    if (!card) return;
    main.querySelectorAll('.habit.editing').forEach(c => { if (c !== card) c.classList.remove('editing'); });
    card.classList.toggle('editing');
    if (card.classList.contains('editing')) {
      const input = card.querySelector(`[data-habit-edit-input="${id}"]`);
      if (input) setTimeout(() => { input.focus(); input.select(); }, 30);
    }
  }));

  main.querySelectorAll('[data-habit-edit-cancel]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    const card = el.closest('.habit');
    if (card) card.classList.remove('editing');
  }));

  main.querySelectorAll('[data-habit-edit-save]').forEach(el => el.addEventListener('click', async (e) => {
    e.stopPropagation();
    const id = el.dataset.habitEditSave;
    const card = el.closest('.habit');
    const input = card?.querySelector(`[data-habit-edit-input="${id}"]`);
    if (!input) return;
    const newName = input.value.trim();
    if (!newName) { input.focus(); return; }
    const h = state.habits.find(x => x.id === id);
    if (h) h.name = newName;
    const nameEl = card.querySelector('.habit-name');
    if (nameEl) nameEl.textContent = newName;
    card.classList.remove('editing');
    dbCall(() => sb.from('habits').update({ name: newName }).eq('id', id));
  }));

  // goal toggle
  main.querySelectorAll('[data-toggle-goal]').forEach(el => el.addEventListener('click', () => {
    const [k, id] = el.dataset.toggleGoal.split('|');
    const g = state.goals[k].find(x => x.id === id);
    if (!g) return;
    g.done = !g.done;
    pulse(el); render();
    dbCall(() => sb.from('goals').update({ checked: g.done }).eq('id', id));
  }));

  // delete handlers
  main.querySelectorAll('[data-del-sched]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.delSched;
    const day = state.selectedDay;
    state.schedule[day] = (state.schedule[day]||[]).filter(s => s.id !== id);
    render();
    dbCall(() => sb.from('schedule_events').delete().eq('id', id));
  }));

  // schedule edit handlers
  main.querySelectorAll('[data-edit-sched]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = el.dataset.editSched;
    const form = document.getElementById('edit-sched-' + id);
    if (!form) return;
    const isOpen = form.classList.contains('open');
    closeAllForms();
    if (!isOpen) form.classList.add('open');
  }));

  main.querySelectorAll('[data-edit-cancel]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.editCancel;
    const form = document.getElementById('edit-sched-' + id);
    if (form) form.classList.remove('open');
  }));

  main.querySelectorAll('[data-edit-save]').forEach(el => el.addEventListener('click', async () => {
    const id = el.dataset.editSave;
    const timeEl  = document.getElementById('f-edit-time-'  + id);
    const titleEl = document.getElementById('f-edit-title-' + id);
    const subEl   = document.getElementById('f-edit-sub-'   + id);
    const alarmEl = document.getElementById('f-edit-alarm-' + id);
    const alarmTimeEl = document.getElementById('f-edit-alarm-time-' + id);
    if (!timeEl || !titleEl) return;
    const newTime  = timeEl.value.trim();
    const newTitle = titleEl.value.trim();
    if (!newTitle) { titleEl.focus(); return; }
    const newSub       = subEl ? subEl.value.trim() : '';
    const alarmEnabled = alarmEl ? alarmEl.checked : false;
    const newAlarmTime = (alarmEnabled && alarmTimeEl) ? alarmTimeEl.value : null;

    const day = state.selectedDay;
    const arr = state.schedule[day] || [];
    const idx = arr.findIndex(s => s.id === id);
    if (idx === -1) return;
    arr[idx] = { ...arr[idx], time: newTime, title: newTitle, sub: newSub, alarm_time: newAlarmTime };

    // update DOM in-place
    const li = document.querySelector(`.sched-item[data-id="${id}"]`);
    if (li) {
      const titleDiv = li.querySelector('.item-title');
      if (titleDiv) titleDiv.innerHTML = escapeHtml(newTitle) + (newAlarmTime ? `<span class="alarm-tag">⏰ ${newAlarmTime}</span>` : '');
      const subDiv = li.querySelector('.item-sub');
      if (newSub) {
        if (subDiv) subDiv.textContent = newSub;
        else {
          const mainDiv = li.querySelector('.item-main');
          if (mainDiv) { const d = document.createElement('div'); d.className = 'item-sub'; d.textContent = newSub; mainDiv.appendChild(d); }
        }
      } else if (subDiv) subDiv.remove();
      const timeDiv = li.querySelector('.time-col');
      if (timeDiv) timeDiv.textContent = newTime;
    }

    const form = document.getElementById('edit-sched-' + id);
    if (form) form.classList.remove('open');

    dbCall(() => sb.from('schedule_events').update({
      time: newTime, title: newTitle, note: newSub, alarm_time: newAlarmTime
    }).eq('id', id));
  }));

  // alarm toggle in edit forms
  main.querySelectorAll('.sched-item [id^="f-edit-alarm-"]').forEach(toggle => {
    const id = toggle.id.replace('f-edit-alarm-', '');
    const timeRow = document.getElementById('edit-alarm-time-row-' + id);
    const alarmTimeInput = document.getElementById('f-edit-alarm-time-' + id);
    const timeInput = document.getElementById('f-edit-time-' + id);
    if (!timeRow) return;
    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        timeRow.classList.add('visible');
        if (alarmTimeInput && timeInput && !alarmTimeInput.value) alarmTimeInput.value = timeInput.value;
      } else {
        timeRow.classList.remove('visible');
      }
    });
  });

  main.querySelectorAll('[data-del-goal]').forEach(el => el.addEventListener('click', () => {
    const [k, id] = el.dataset.delGoal.split('|');
    state.goals[k] = state.goals[k].filter(x => x.id !== id);
    render();
    dbCall(() => sb.from('goals').delete().eq('id', id));
  }));

  main.querySelectorAll('[data-del-focus]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.delFocus;
    state.focus.tasks = state.focus.tasks.filter(t => t.id !== id);
    render();
    dbCall(() => sb.from('focus_tasks').delete().eq('id', id));
  }));

  main.querySelectorAll('[data-del-income]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.delIncome;
    state.income = state.income.filter(x => x.id !== id);
    render();
    dbCall(() => sb.from('income_entries').delete().eq('id', id));
  }));

  main.querySelectorAll('[data-del-spend]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.delSpend;
    state.spending = state.spending.filter(x => x.id !== id);
    render();
    dbCall(() => sb.from('spending_entries').delete().eq('id', id));
  }));

  main.querySelectorAll('[data-pay-debt]').forEach(el => el.addEventListener('click', () => {
    const d = state.debts.find(x => x.id === el.dataset.payDebt);
    if (!d) return;
    d.paid = true;
    render();
    dbCall(() => sb.from('debts').update({ paid: true }).eq('id', d.id));
  }));

  // forms — open / cancel
  main.querySelectorAll('[data-open-form]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    closeAllForms();
    document.getElementById(el.dataset.openForm)?.classList.add('open');
    setTimeout(() => document.getElementById(el.dataset.openForm)?.querySelector('input,select,textarea')?.focus(), 60);
  }));
  const addSched = main.querySelector('#add-sched-btn');
  if (addSched) addSched.addEventListener('click', (e) => {
    e.stopPropagation();
    closeAllForms();
    document.getElementById('add-sched-form').classList.add('open');
    setTimeout(() => document.getElementById('f-sched-title')?.focus(), 60);
  });

  // alarm toggle show/hide + sync time
  const alarmToggle = main.querySelector('#f-sched-alarm');
  const alarmTimeRow = main.querySelector('#alarm-time-row');
  if (alarmToggle && alarmTimeRow) {
    alarmToggle.addEventListener('change', () => {
      alarmTimeRow.classList.toggle('visible', alarmToggle.checked);
      if (alarmToggle.checked) {
        const t = main.querySelector('#f-sched-time').value;
        if (t) main.querySelector('#f-sched-alarm-time').value = t;
      }
    });
    main.querySelector('#f-sched-time')?.addEventListener('change', () => {
      if (alarmToggle.checked) {
        main.querySelector('#f-sched-alarm-time').value = main.querySelector('#f-sched-time').value;
      }
    });
  }
  main.querySelectorAll('[data-cancel]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById(el.dataset.cancel)?.classList.remove('open');
  }));

  // form saves
  bindFormSaves();

  // focus textarea autosave (debounced)
  const fmEl = main.querySelector('#focus-main');
  if (fmEl) {
    let focusTimer = null;
    fmEl.addEventListener('input', () => {
      state.focus.main = fmEl.value;
      clearTimeout(focusTimer);
      focusTimer = setTimeout(() => {
        if (focusBoardId) dbCall(() => sb.from('focus_board').update({ main_focus: state.focus.main }).eq('id', focusBoardId));
      }, 600);
    });
  }

  // focus task description — click to edit, blur to save
  main.querySelectorAll('[data-desc-id]').forEach(wrap => {
    const taskId = wrap.dataset.descId;
    wrap.addEventListener('click', (e) => {
      if (wrap.querySelector('textarea')) return;
      e.stopPropagation();
      const task = state.focus.tasks.find(t => t.id === taskId);
      const ta = document.createElement('textarea');
      ta.className = 'task-desc-ta';
      ta.value = task ? (task.description || '') : '';
      ta.placeholder = 'Add description...';
      ta.rows = 2;
      wrap.innerHTML = '';
      wrap.appendChild(ta);
      ta.focus();
      let committed = false;
      const commit = () => {
        if (committed) return;
        committed = true;
        const newDesc = ta.value.trim();
        if (task) task.description = newDesc;
        wrap.innerHTML = newDesc
          ? `<div class="task-desc-text">${escapeHtml(newDesc)}</div>`
          : `<div class="task-desc-ph">Add description...</div>`;
        try { dbCall(() => sb.from('focus_tasks').update({ description: newDesc || null }).eq('id', taskId)); } catch (_) {}
      };
      ta.addEventListener('blur', commit);
      ta.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') ta.blur(); });
    });
  });
}

function bindFormSaves() {
  // schedule
  const schedSave = main.querySelector('#f-sched-save');
  if (schedSave) schedSave.addEventListener('click', async () => {
    const time = main.querySelector('#f-sched-time').value || '09:00';
    const title = main.querySelector('#f-sched-title').value.trim();
    const sub = main.querySelector('#f-sched-sub').value.trim();
    if (!title) return;
    const day = state.selectedDay || todayISO();
    const alarmOn = main.querySelector('#f-sched-alarm')?.checked;
    const alarm_time = alarmOn ? (main.querySelector('#f-sched-alarm-time')?.value || time) : null;
    const { data } = await dbCall(() => sb.from('schedule_events').insert({ user_id: currentUser.id, date: day, time, title, note: sub, alarm_time }).select().single());
    if (data) {
      if (!state.schedule[day]) state.schedule[day] = [];
      state.schedule[day].push({ id: data.id, time, title, sub, alarm_time });
      state.schedule[day].sort((a,b) => a.time.localeCompare(b.time));
      render();
    }
  });

  // goals
  main.querySelectorAll('[data-goal-save]').forEach(btn => btn.addEventListener('click', async () => {
    const k = btn.dataset.goalSave;
    const input = main.querySelector(`[data-goal-input="${k}"]`);
    const text = input?.value.trim();
    if (!text) return;
    const type = k === 'dos' ? 'do' : 'dont';
    const { data } = await dbCall(() => sb.from('goals').insert({ user_id: currentUser.id, type, text, checked: false }).select().single());
    if (data) { state.goals[k].push({ id: data.id, text, done: false }); render(); }
  }));

  // habit
  const hb = main.querySelector('#f-habit-save');
  if (hb) hb.addEventListener('click', async () => {
    const name = main.querySelector('#f-habit-name').value.trim();
    if (!name) return;
    const { data } = await dbCall(() => sb.from('habits').insert({ user_id: currentUser.id, name, streak: 0 }).select().single());
    if (data) { state.habits.push({ id: data.id, name, streak: 0, doneToday: false, log: [0,0,0,0,0,0,0] }); render(); }
  });

  // focus task
  const ff = main.querySelector('#f-focus-save');
  if (ff) ff.addEventListener('click', async () => {
    const text = main.querySelector('#f-focus-text').value.trim();
    if (!text || !focusBoardId) return;
    const { data } = await dbCall(() => sb.from('focus_tasks').insert({ focus_id: focusBoardId, user_id: currentUser.id, text, checked: false }).select().single());
    if (data) { state.focus.tasks.push({ id: data.id, text, done: false, description: '' }); render(); }
  });

  // income
  const inc = main.querySelector('#f-inc-save');
  if (inc) inc.addEventListener('click', async () => {
    const source = main.querySelector('#f-inc-source').value.trim();
    const amount = Number(main.querySelector('#f-inc-amount').value || 0);
    const date = main.querySelector('#f-inc-date').value || todayISO();
    if (!source || !amount) return;
    const { data } = await dbCall(() => sb.from('income_entries').insert({ user_id: currentUser.id, date, source, amount }).select().single());
    if (data) { state.income.unshift({ id: data.id, date, source, amount }); render(); }
  });

  // spending
  const sp = main.querySelector('#f-sp-save');
  if (sp) sp.addEventListener('click', async () => {
    const cat = main.querySelector('#f-sp-cat').value;
    const amount = Number(main.querySelector('#f-sp-amount').value || 0);
    const note = main.querySelector('#f-sp-note').value.trim();
    if (!amount) return;
    const t = new Date();
    const time = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    const date = todayISO();
    const { data } = await dbCall(() => sb.from('spending_entries').insert({ user_id: currentUser.id, date, time, category: cat, note, amount }).select().single());
    if (data) { state.spending.unshift({ id: data.id, date, time, cat, note, amount }); render(); }
  });

  // debt
  const db = main.querySelector('#f-debt-save');
  if (db) db.addEventListener('click', async () => {
    const creditor = main.querySelector('#f-debt-creditor').value.trim();
    const amount = Number(main.querySelector('#f-debt-amount').value || 0);
    const due = main.querySelector('#f-debt-due').value || todayISO();
    if (!creditor || !amount) return;
    const { data } = await dbCall(() => sb.from('debts').insert({ user_id: currentUser.id, creditor, amount, due_date: due, paid: false }).select().single());
    if (data) { state.debts.push({ id: data.id, creditor, amount, due, paid: false }); render(); }
  });
}

function pulse(el) {
  el.classList.remove('pulse');
  void el.offsetWidth;
  el.classList.add('pulse');
}
function closeAllForms() {
  document.querySelectorAll('.inline-form.open').forEach(f => f.classList.remove('open'));
}
document.addEventListener('click', (e) => {
  document.querySelectorAll('.inline-form.open').forEach(f => {
    if (!f.contains(e.target) && !e.target.closest('[data-open-form], #add-sched-btn')) {
      f.classList.remove('open');
    }
  });
  if (!e.target.closest('.habit.delete-mode')) {
    document.querySelectorAll('.habit.delete-mode').forEach(c => c.classList.remove('delete-mode'));
  }
});

   GLOBAL NAV BINDINGS (sidebar + bottom nav)
   — called once after app is shown

  document.querySelectorAll('.sidebar .nav-item').forEach(el => {
    el.addEventListener('click', () => setActiveTab(el.dataset.go));
  });
  document.querySelectorAll('.bottom-nav .tab-btn').forEach(el => {

  });
  document.getElementById('sidebar-logout-btn').addEventListener('click', signOut);
}

/* =========================================================
   ALARMS
========================================================= */
function playAlarmBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 440;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
    osc.onended = () => ctx.close();
  } catch (e) {}
}

function fireAlarm(ev) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('HQ — ' + ev.title, {
      body: 'Scheduled for ' + ev.time,
      icon: '/icon-192.png'
    });
  }
  playAlarmBeep();
}

function checkAlarms() {
  const today = todayISO();
  const events = state.schedule[today] || [];
  if (!events.length) return;
  const now = new Date();
  const nowMinutes = now.getHours() * 60 + now.getMinutes();
  events.forEach(ev => {
    if (!ev.alarm_time) return;
    if (firedAlarms.has(ev.id)) return;
    const [hh, mm] = ev.alarm_time.split(':').map(Number);
    const alarmMinutes = hh * 60 + mm;
    if (Math.abs(nowMinutes - alarmMinutes) <= 1) {
      firedAlarms.add(ev.id);
      fireAlarm(ev);
    }
  });
}

/* =========================================================
   TWEAKS PANEL
========================================================= */
const tweaksEl = document.getElementById('tweaks-panel');
function toggleTweaks() { tweaksEl.classList.toggle('open'); }

document.getElementById('tweaks-close').addEventListener('click', () => tweaksEl.classList.remove('open'));

function setTweak(key, value) {
  window.__HQ_TWEAKS[key] = value;
  applyTweaks();
  if (key === 'name') {
    state.profile.name = value;
    if (currentUser) dbCall(() => sb.from('profiles').update({ name: value }).eq('id', currentUser.id));
  }
  render();
  syncTweaksUI();
}

function syncTweaksUI() {
  const tw = window.__HQ_TWEAKS;
  const twName = document.getElementById('tw-name');
  const twCurr = document.getElementById('tw-currency');
  if (twName) twName.value = tw.name || '';
  if (twCurr) twCurr.value = tw.currencyPrefix || '$';
  document.querySelectorAll('#tw-swatches .sw').forEach(s => s.classList.toggle('active', s.dataset.c === tw.accent));
  document.querySelectorAll('#tw-density button').forEach(b => b.classList.toggle('active', b.dataset.v === tw.density));
  document.querySelectorAll('#tw-weight button').forEach(b => b.classList.toggle('active', String(b.dataset.v) === String(tw.numberWeight)));
  document.querySelectorAll('#tw-home button').forEach(b => b.classList.toggle('active', b.dataset.v === tw.homeLayout));
  document.querySelectorAll('#tw-pills button').forEach(b => b.classList.toggle('active', String(b.dataset.v) === String(tw.showQuickPills)));
}

document.getElementById('tw-name').addEventListener('input', (e) => setTweak('name', e.target.value));
document.getElementById('tw-currency').addEventListener('input', (e) => setTweak('currencyPrefix', e.target.value));
document.querySelectorAll('#tw-swatches .sw').forEach(s => s.addEventListener('click', () => setTweak('accent', s.dataset.c)));
document.querySelectorAll('#tw-density button').forEach(b => b.addEventListener('click', () => setTweak('density', b.dataset.v)));
document.querySelectorAll('#tw-weight button').forEach(b => b.addEventListener('click', () => setTweak('numberWeight', Number(b.dataset.v))));
document.querySelectorAll('#tw-home button').forEach(b => b.addEventListener('click', () => setTweak('homeLayout', b.dataset.v)));
document.querySelectorAll('#tw-pills button').forEach(b => b.addEventListener('click', () => setTweak('showQuickPills', b.dataset.v === 'true')));

window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === '__activate_edit_mode') tweaksEl.classList.add('open');
  if (d.type === '__deactivate_edit_mode') tweaksEl.classList.remove('open');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
