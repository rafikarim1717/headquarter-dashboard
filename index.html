<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Headquarter</title>
<link rel="icon" href="icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="HQ">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  window.__HQ_TWEAKS = {
    "name": "Alex",
    "accent": "#f5f0e8",
    "density": "compact",
    "numberWeight": 400,
    "showQuickPills": true,
    "currencyPrefix": "Rp ",
    "homeLayout": "stacked"
  };
</script>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="ring">
    <i style="--clr:#4f8ef7;"></i>
    <i style="--clr:#9b59b6;"></i>
    <i style="--clr:#7f8c8d;"></i>
    <div class="ring-login">
      <h2>Headquarters</h2>
      <div class="ring-input-box">
        <input type="email" id="login-email" placeholder="Email address" autocomplete="email">
      </div>
      <div class="ring-input-box">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="ring-input-box">
        <button class="ring-submit" id="email-login-btn">Sign in</button>
      </div>
      <div class="ring-input-box">
        <button class="ring-google-btn" id="google-login-btn">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.20455C17.64 8.56637 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"/>
            <path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"/>
            <path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957275C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
            <path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </div>
      <button class="ring-forgot" id="forgot-password-btn">Forgot password?</button>
      <button id="email-signup-btn" style="display:none"></button>
      <div class="login-msg" id="login-msg"></div>
    </div>
  </div>
</div>

<!-- Loading overlay (shown while fetching data after login) -->
<div id="app-loading" class="hidden">
  <div class="loading-dot"></div>
</div>

<!-- App Shell (hidden until authenticated) -->
<div class="app" id="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-brand">
        <span class="brand-hq">HQ</span>
        <span class="brand-label">Headquarters</span>
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">&#xAB;</button>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Life</div>
        <button class="nav-item" data-go="life:home" data-tooltip="Today">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
          <span class="nav-label">Today</span>
        </button>
        <button class="nav-item" data-go="life:schedule" data-tooltip="Schedule">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
          <span class="nav-label">Schedule</span>
        </button>
        <button class="nav-item" data-go="life:goals" data-tooltip="Goals &amp; Rules">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="nav-label">Goals &amp; Rules</span>
        </button>
        <button class="nav-item" data-go="life:habits" data-tooltip="Habits">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
          <span class="nav-label">Habits</span>
        </button>
        <button class="nav-item" data-go="life:focus" data-tooltip="Focus">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 3.75H6A2.25 2.25 0 003.75 6v1.5M16.5 3.75H18A2.25 2.25 0 0120.25 6v1.5m0 9V18A2.25 2.25 0 0118 20.25h-1.5m-9 0H6A2.25 2.25 0 013.75 18v-1.5M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="nav-label">Focus</span>
        </button>
        <button class="nav-item" data-go="life:notes" data-tooltip="Notes">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
          <span class="nav-label">Notes</span>
        </button>
        <div class="nav-section-label">Finance</div>
        <button class="nav-item" data-go="finance:overview" data-tooltip="Overview">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
          <span class="nav-label">Overview</span>
        </button>
        <button class="nav-item" data-go="finance:income" data-tooltip="Income">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"/></svg>
          <span class="nav-label">Income</span>
        </button>
        <button class="nav-item" data-go="finance:spending" data-tooltip="Spending">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
          <span class="nav-label">Spending</span>
        </button>
        <button class="nav-item" data-go="finance:debts" data-tooltip="Debts">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/></svg>
          <span class="nav-label">Debts</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-signout" id="sidebar-logout-btn" data-tooltip="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
          <span class="nav-label">Sign out</span>
        </button>
      </div>
    </div>
  </aside>
  <main id="main"></main>
</div>

<!-- Mobile bottom nav -->
<nav class="bottom-nav" id="bottom-nav" style="display:none">
  <button class="main-tab-btn" data-main-tab="life">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
    <span class="lbl">Life</span>
  </button>
  <button class="main-tab-btn" data-main-tab="finance">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
    <span class="lbl">Finance</span>
  </button>
</nav>

<!-- Tweaks Panel -->
<div id="tweaks-panel">
  <h4><span>Tweaks</span><button class="x" id="tweaks-close" aria-label="Close">&#x2715;</button></h4>
  <div class="row"><label>Your name</label><input type="text" id="tw-name"></div>
  <div class="row">
    <label>Accent</label>
    <div class="swatches" id="tw-swatches">
      <div class="sw" data-c="#f5f0e8" style="background:#f5f0e8"></div>
      <div class="sw" data-c="#e8b4a0" style="background:#e8b4a0"></div>
      <div class="sw" data-c="#a8c5b0" style="background:#a8c5b0"></div>
      <div class="sw" data-c="#b5b8d8" style="background:#b5b8d8"></div>
      <div class="sw" data-c="#d8c980" style="background:#d8c980"></div>
      <div class="sw" data-c="#c89cd0" style="background:#c89cd0"></div>
    </div>
  </div>
  <div class="row"><label>Density</label><div class="seg" id="tw-density"><button data-v="comfortable">Comfortable</button><button data-v="compact">Compact</button></div></div>
  <div class="row"><label>Big number weight</label><div class="seg" id="tw-weight"><button data-v="200">200</button><button data-v="300">300</button><button data-v="400">400</button></div></div>
  <div class="row"><label>Today layout</label><div class="seg" id="tw-home"><button data-v="stacked">Stacked</button><button data-v="hero">Hero focus</button></div></div>
  <div class="row"><label>Quick pills on Today</label><div class="seg" id="tw-pills"><button data-v="true">On</button><button data-v="false">Off</button></div></div>
  <div class="row"><label>Currency prefix</label><input type="text" id="tw-currency" maxlength="3"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Tooltip for collapsed sidebar -->
<div id="nav-tooltip"></div>

<script src="js/app.js"></script>
<script src="js/navigation.js"></script>
<script src="js/supabase.js"></script>
</body>
</html>
